stages:
    - test
    - deploy

.job_template: &test_job
    stage: test
    before_script:
        - composer update --prefer-dist --no-progress --no-interaction
    script:
        - phing test
    cache:
        paths:
            - vendor/
    rules:
        -   if: $CI_COMMIT_BRANCH

test:php8.3:
    <<: *test_job
    image: nexendrie/php:8.3

test:reports:
    <<: *test_job
    image: nexendrie/php:8.3
    variables:
        REPORTS: 1
    coverage: '/(\d+\%) covered/'
    artifacts:
        paths:
            - coverage.xml
            - junit.xml
        reports:
            coverage_report:
                coverage_format: cobertura
                path: coverage.xml
            junit: junit.xml

pages:
    stage: deploy
    environment:
        name: documentation
        url: https://nexendrie.gitlab.io/site-generator
    image: nexendrie/php:8.3
    before_script:
        - composer update --prefer-dist --no-progress --no-interaction
    script:
        - phing documentation
    cache:
        paths:
            - vendor/
    artifacts:
        paths:
            - public
    only:
        - tags@nexendrie/site-generator

release:
    stage: deploy
    image: registry.gitlab.com/gitlab-org/release-cli:latest
    rules:
        -   if: $CI_COMMIT_TAG
    script:
        - echo "Creating GitLab release"
    release:
        tag_name: $CI_COMMIT_TAG
        name: "Version $CI_COMMIT_TAG"
        description: "./RELEASE_NOTES"
